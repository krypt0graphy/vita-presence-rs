name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: vita-presence-rs
            artifact_name: vita-presence-rs
          - os: macos-latest
            artifact: vita-presence-rs
            artifact_name: vita-presence-rs-macos
          - os: windows-latest
            artifact: vita-presence-rs.exe
            artifact_name: vita-presence-rs-windows.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Rename artifact
        shell: bash
        run: mv target/release/${{ matrix.artifact }} target/release/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum vita-presence-rs vita-presence-rs-macos vita-presence-rs-windows.exe > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/vita-presence-rs
            artifacts/vita-presence-rs-macos
            artifacts/vita-presence-rs-windows.exe
            artifacts/checksums.txt
          generate_release_notes: true